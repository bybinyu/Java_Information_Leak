server:
  port: 8080

spring:
  application:
    name: knowledge-base
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  datasource:
    url: jdbc:h2:file:./data/knowledge_base;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console
  web:
    resources:
      cache:
        cachecontrol:
          max-age: 0
      add-mappings: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

# ============================================
# Actuator — debug endpoints (enable with caution)
# ============================================
management:
  endpoints:
    web:
      exposure:
        include: env,configprops,beans
  endpoint:
    env:
      show-values: always